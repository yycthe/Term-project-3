# Conda environment (includes libomp for XGBoost on macOS)
# Usage: conda env create -f environment.yml && conda activate nba-predictor
name: nba-predictor
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - llvm-openmp   # Provides libomp.dylib required by XGBoost on macOS
  - pip
  - pip:
    - pandas
    - numpy
    - scikit-learn
    - xgboost
    - matplotlib
    - seaborn
    - streamlit
    - joblib
    - tabulate
    - optuna
    - nba_api
    - requests
    - firebase-admin==6.8.0
